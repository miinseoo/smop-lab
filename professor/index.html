<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professor — SMOP Lab</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/professor.css" />
</head>
<body>

<div id="nav-root"></div>
<script src="../components/nav.js"></script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="../">Home</a><span>/</span><span>Professor</span></div>
    <h1>Professor</h1>
    <p>Meet the director of the SMOP Lab</p>
  </div>
</div>

<section>
  <div class="section-inner">
    <div class="prof-grid">
      <div class="prof-sidebar" id="prof-sidebar"></div>
      <div class="prof-main" id="prof-main"></div>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../components/footer.js"></script>

<script src="../data/professor.js"></script>
<script>
const P = PROFESSOR;

document.getElementById("prof-sidebar").innerHTML = `
  <div class="prof-photo">${P.photo ? `<img src="../${P.photo}" alt="${P.name}">` : ""}</div>
  <p class="prof-name">${P.name}</p>
  <p class="prof-title">${P.title}</p>
  <div class="prof-contacts">
    <a href="mailto:${P.email}" class="contact-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      ${P.email}
    </a>
    <div class="contact-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.07 3.18 2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16z"/></svg>
      ${P.phone}
    </div>
    <div class="contact-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      ${P.office}
    </div>
  </div>`;

const bio = P.bio.map(p => `<p class="bio-text">${p}</p>`).join("");
const interests = P.interests.map(i => `<div class="interest-pill">${i}</div>`).join("");
const education = P.education.map(e => `
  <div class="edu-item">
    <div class="edu-degree">${e.degree}</div>
    <div class="edu-info">
      <p class="edu-school">${e.school}</p>
      <p class="edu-field">${e.field}</p>
      <p class="edu-year">${e.year}</p>
    </div>
  </div>`).join("");
const career = P.career.map(c => `
  <div class="career-item">
    <div class="career-year">${c.period}</div>
    <div>
      <p class="career-role">${c.role}</p>
      <p class="career-org">${c.org}</p>
    </div>
  </div>`).join("");
const awards = P.awards.map(a => `
  <div class="award-item">
    <div class="award-year">${a.year}</div>
    <div>
      <p class="award-name">${a.name}</p>
      <p class="award-org">${a.org}</p>
    </div>
  </div>`).join("");

document.getElementById("prof-main").innerHTML = `
  <div>
    <h2 class="prof-section-title">Biography</h2>
    ${bio}
  </div>
  <div>
    <h2 class="prof-section-title">Research Interests</h2>
    <div class="interest-grid">${interests}</div>
  </div>
  <div>
    <h2 class="prof-section-title">Education</h2>
    <div>${education}</div>
  </div>
  <div>
    <h2 class="prof-section-title">Academic & Professional Career</h2>
    <div>${career}</div>
  </div>
  <div>
    <h2 class="prof-section-title">Awards & Honors</h2>
    <div>${awards}</div>
  </div>`;
</script>

</body>
</html>
