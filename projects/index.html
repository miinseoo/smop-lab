<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — SMOP Lab</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/projects.css" />
</head>
<body>

<div id="nav-root"></div>
<script src="../components/nav.js"></script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="../">Home</a><span>/</span><span>Projects</span></div>
    <h1>Research Projects</h1>
    <p>Government-funded and university research projects since 2020</p>
  </div>
</div>

<section>
  <div class="section-inner">
    <div id="proj-list"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../components/footer.js"></script>

<script src="../data/projects.js"></script>
<script>
const currentYear = new Date().getFullYear();

function isOngoing(period) {
  const parts = period.split(/[–\-]/);
  const endYear = parseInt(parts[parts.length - 1].trim());
  return !isNaN(endYear) && endYear >= currentYear;
}

const groups = {};
PROJECTS.forEach(p => {
  if (!groups[p.startYear]) groups[p.startYear] = [];
  groups[p.startYear].push(p);
});

const years = Object.keys(groups).map(Number).sort((a,b) => b - a);
let html = "";
years.forEach(yr => {
  const items = groups[yr];
  html += `<div class="year-group">
    <h2 class="year-label">${yr} <span class="year-count">${items.length} project${items.length !== 1 ? 's' : ''}</span></h2>
    <div class="proj-grid">`;
  items.forEach(p => {
    const ongoing = isOngoing(p.period);
    html += `
      <div class="proj-card">
        <div class="proj-top">
          <p class="proj-title">${p.title}</p>
          <span class="proj-period">${p.period}</span>
        </div>
        <p class="proj-agency">${p.agency}</p>
        <p class="proj-desc">${p.desc}</p>
        <span class="proj-status ${ongoing ? 'active' : 'completed'}">${ongoing ? 'Ongoing' : 'Completed'}</span>
      </div>`;
  });
  html += `</div></div>`;
});

document.getElementById("proj-list").innerHTML = html;
</script>

</body>
</html>
