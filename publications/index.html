<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications — SMOP Lab</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/publications.css" />
</head>
<body>

<div id="nav-root"></div>
<script src="../components/nav.js"></script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="../">Home</a><span>/</span><span>Publications</span></div>
    <h1>Publications</h1>
    <p>Peer-reviewed articles, book chapters, and patents</p>
  </div>
</div>

<section>
  <div class="section-inner">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="journal">International Journals</button>
      <button class="filter-btn" data-filter="domestic">Domestic Journals</button>
      <button class="filter-btn" data-filter="conference">Conferences</button>
      <button class="filter-btn" data-filter="book-chapter">Book Chapters</button>
      <button class="filter-btn" data-filter="patent">Patents</button>
    </div>
    <div id="pub-list"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../components/footer.js"></script>

<script src="../data/publications.js"></script>
<script>
const TAG_CLASS = {
  "International Journal": "tag-blue",
  "Domestic Journal": "tag-orange",
  "Conference": "tag-purple",
  "Book Chapter": "tag-green",
  "Patent": "", "SCI": "", "SSCI": "",
};
const SPECIAL_LABELS = { "book-chapter": "Book Chapters", "patent": "Patents" };

function renderAuthors(authors) {
  return authors.map(a => a === "Kang, Seungmo" || a === "강승모"
    ? `<strong>${a}</strong>` : a).join("; ");
}
function renderTags(tags) {
  return tags.map(t => `<span class="tag ${TAG_CLASS[t] || ''}">${t}</span>`).join("");
}

function render(filter) {
  const items = filter === "all" ? PUBLICATIONS : PUBLICATIONS.filter(p => p.type === filter);
  const groups = {};
  items.forEach(p => {
    if (!groups[p.yearLabel]) groups[p.yearLabel] = [];
    groups[p.yearLabel].push(p);
  });

  let html = "";
  const seen = new Set();
  items.forEach(p => {
    if (seen.has(p.yearLabel)) return;
    seen.add(p.yearLabel);
    const grp = groups[p.yearLabel];
    const isSpecial = SPECIAL_LABELS[p.type];
    const label = isSpecial
      ? `<p class="category-title">${p.yearLabel}</p>`
      : (() => {
          const domestic = grp.filter(x => x.type === "domestic").length;
          const intl = grp.length - domestic;
          const allAccepted = grp.filter(x => x.type !== "domestic" && x.accepted).length === intl && intl > 0;
          let cnt = String(intl);
          if (allAccepted) cnt += " accepted";
          if (domestic > 0) cnt += ` + ${domestic} domestic`;
          return `<h2 class="year-label">${p.yearLabel} <span class="year-count">${cnt}</span></h2>`;
        })();
    html += `<div class="year-group">${label}`;
    grp.forEach(pub => {
      const venue = pub.accepted ? pub.venue + " · Accepted" : pub.venue;
      html += `
        <div class="pub-item">
          <div class="pub-num">${pub.id}</div>
          <div class="pub-body">
            <p class="pub-title">${pub.title}</p>
            <p class="pub-authors">${renderAuthors(pub.authors)}</p>
            <p class="pub-venue">${venue}</p>
            <div class="pub-tags">${renderTags(pub.tags)}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("pub-list").innerHTML = html;
}

render("all");

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render(btn.dataset.filter);
  });
});
</script>

</body>
</html>
