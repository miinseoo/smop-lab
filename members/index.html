<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members — SMOP Lab</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/members.css" />
</head>
<body>

<div id="nav-root"></div>
<script src="../components/nav.js"></script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="../">Home</a><span>/</span><span>Members</span></div>
    <h1>Lab Members</h1>
    <p>The people behind SMOP Lab's research</p>
  </div>
</div>

<!-- Sub-nav: Current Members / Alumni 전환 -->
<div class="members-subnav">
  <div class="members-subnav-inner">
    <a href="./" class="active">Current Members</a>
    <a href="alumni/">Alumni</a>
  </div>
</div>

<section>
  <div class="section-inner">
    <div id="panel-current"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../components/footer.js"></script>

<script src="../data/members.js"></script>
<script>
const ROLE_CONFIG = {
  postdoc:  { label: "Postdoctoral Researchers", tag: "tag-purple", badge: "Postdoctoral Researcher" },
  phd:      { label: "Ph.D. Candidates",         tag: "tag-blue",   badge: "Ph.D. Candidate" },
  phdcourse:{ label: "Ph.D. Course",             tag: "tag-blue",   badge: "Ph.D. Course" },
  masters:  { label: "Master's Course",           tag: "tag-teal",   badge: "Master's Course" },
  undergrad:{ label: "Undergraduate Researchers", tag: "tag-green",  badge: "Undergraduate Researcher" },
};
const ROLE_ORDER = ["postdoc","phd","phdcourse","masters","undergrad"];

const LINK_ICONS = {
  linkedin: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
  github: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>`,
  googlescholar: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 24a7 7 0 1 1 0-14 7 7 0 0 1 0 14zm0-24L0 9.5l4.838 3.94A8 8 0 0 1 12 10a8 8 0 0 1 7.162 3.44L24 9.5z"/></svg>`,
  website: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
};

function renderCurrent() {
  let html = "";
  ROLE_ORDER.forEach(role => {
    const members = CURRENT_MEMBERS.filter(m => m.role === role);
    if (!members.length) return;
    const cfg = ROLE_CONFIG[role];
    html += `<div class="member-section"><p class="member-section-title">${cfg.label}</p><div class="member-grid">`;
    members.forEach(m => {
      const avatar = m.photo ? `<img src="../${m.photo}" alt="${m.name}">` : "";
      const linkIcons = (m.links || []).map(l => `
        <a href="${l.url}" target="_blank" rel="noopener" class="member-link member-link-${l.type}" title="${l.type}">
          ${LINK_ICONS[l.type] || LINK_ICONS.website}
        </a>`).join("");
      html += `
        <div class="member-card">
          <div class="member-avatar">${avatar}</div>
          <div class="member-info">
            <p class="member-name">${m.name}</p>
            <p class="member-name-kr">${m.nameKr}</p>
            <span class="tag ${cfg.tag} member-role">${cfg.badge}</span>
            <p class="member-interest">${m.interest}</p>
            <div class="member-footer">
              <p class="member-email"><a href="mailto:${m.email}">${m.email}</a></p>
              ${linkIcons ? `<div class="member-links">${linkIcons}</div>` : ""}
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("panel-current").innerHTML = html;
}

renderCurrent();
</script>

</body>
</html>
