<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members — SMOP Lab</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/members.css" />
</head>
<body>

<div id="nav-root"></div>
<script src="../components/nav.js"></script>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb"><a href="../">Home</a><span>/</span><span>Members</span></div>
    <h1>Lab Members</h1>
    <p>The people behind SMOP Lab's research</p>
  </div>
</div>

<section>
  <div class="section-inner">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('current', this)">Current Members</button>
      <button class="tab" onclick="switchTab('alumni', this)">Alumni</button>
    </div>

    <div id="panel-current"></div>
    <div id="panel-alumni" class="tab-panel-hidden">
      <p class="section-sub" style="margin-bottom:2rem;">Former members of SMOP Lab and their current positions.</p>
      <div class="alumni-list" id="alumni-list"></div>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="../components/footer.js"></script>

<script src="../data/members.js"></script>
<script>
const ROLE_CONFIG = {
  postdoc:  { label: "Postdoctoral Researchers", tag: "tag-purple", badge: "Postdoctoral Researcher" },
  phd:      { label: "Ph.D. Candidates",         tag: "tag-blue",   badge: "Ph.D. Candidate" },
  masters:  { label: "Master's Students",         tag: "tag-teal",   badge: "Master's Student" },
  undergrad:{ label: "Undergraduate Researchers", tag: "tag-green",  badge: "Undergraduate Researcher" },
};
const ROLE_ORDER = ["postdoc","phd","masters","undergrad"];

function renderCurrent() {
  let html = "";
  ROLE_ORDER.forEach(role => {
    const members = CURRENT_MEMBERS.filter(m => m.role === role);
    if (!members.length) return;
    const cfg = ROLE_CONFIG[role];
    html += `<div class="member-section"><p class="member-section-title">${cfg.label}</p><div class="member-grid">`;
    members.forEach(m => {
      const avatar = m.photo ? `<img src="../${m.photo}" alt="${m.name}">` : "";
      html += `
        <div class="member-card">
          <div class="member-avatar">${avatar}</div>
          <div class="member-info">
            <p class="member-name">${m.name}</p>
            <p class="member-name-kr">${m.nameKr}</p>
            <span class="tag ${cfg.tag} member-role">${cfg.badge}</span>
            <p class="member-interest">${m.interest}</p>
            <p class="member-email"><a href="mailto:${m.email}">${m.email}</a></p>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("panel-current").innerHTML = html;
}

function renderAlumni() {
  const sorted = [...ALUMNI].sort((a,b) => b.year - a.year);
  const html = sorted.map(a => {
    const initials = a.name.split(/[\s,]+/).filter(Boolean).slice(0,2).map(s => s[0]).join("");
    const avatar = a.photo
      ? `<div class="alumni-avatar"><img src="../${a.photo}" alt="${a.name}"></div>`
      : `<div class="alumni-avatar"><div class="alumni-avatar-initials">${initials}</div></div>`;
    return `
      <div class="alumni-item">
        ${avatar}
        <span class="alumni-year">${a.year}</span>
        <span class="alumni-name">${a.name}${a.nameKr ? ` · <span style="font-weight:400;color:var(--gray-500)">${a.nameKr}</span>` : ""} · <span style="font-weight:400;color:var(--gray-600)">${a.degree}</span></span>
        <span class="alumni-where">→ ${a.position}</span>
      </div>`;
  }).join("");
  document.getElementById("alumni-list").innerHTML = html;
}

renderCurrent();
renderAlumni();

function switchTab(panel, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-current").classList.toggle("tab-panel-hidden", panel !== "current");
  document.getElementById("panel-alumni").classList.toggle("tab-panel-hidden",  panel !== "alumni");
}
</script>

</body>
</html>
